# .github/workflows/ci.yml
# -------------------------
# Continuous Integration pipeline.
# Triggers on every pull request to main and on every push to main.
#
# What it does:
#   1. Lint: checks code style with flake8
#   2. Test: runs the unit test suite with pytest
#   3. Build: builds the Docker image to verify it compiles cleanly
#
# It does NOT deploy — that is handled by cd.yml which only runs
# after CI passes on a merge to main.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # Catches style issues and obvious errors before running tests.
  # Fast and cheap — fails early if code quality is off.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Cache pip dependencies so repeated runs don't re-download
          cache: "pip"

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8
        run: |
          # E501: line too long — relaxed to 120 for readability
          # W503: line break before binary operator — stylistic, ignore
          flake8 . \
            --max-line-length=120 \
            --extend-ignore=W503 \
            --exclude=.git,__pycache__,output

  # ---------------------------------------------------------------------------
  # Job 2: Test
  # Runs the full test suite. Uses mock data so no real API keys are needed.
  # Depends on lint passing — no point running tests on broken code.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint   # only runs if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        # ANTHROPIC_API_KEY is set to a dummy value so the app initializes,
        # but all tests use mock data and never hit the real API
        env:
          ANTHROPIC_API_KEY: "test-key-not-real"
          TAVILY_API_KEY: ""
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 3: Docker Build
  # Verifies the Dockerfile builds successfully.
  # Does not push — just confirms the image compiles on every PR.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test   # only builds if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        # Buildx enables multi-platform builds and better caching
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false       # CI only builds — CD handles the push
          tags: vc-esg-agent:ci
          # Cache layers from the GitHub Actions cache to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
